site_name: Google ADK for .NET
site_url: https://sps014.github.io/GoogleAdk-cs/
repo_url: https://github.com/sps014/GoogleAdk-cs
repo_name: sps014/GoogleAdk-cs

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  logo: https://adk.dev/assets/agent-development-kit.png
  favicon: https://adk.dev/assets/agent-development-kit.png
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: slate
    primary: black
    accent: deep-purple
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.expand
    - toc.follow

extra_css:
  - stylesheets/custom.css

extra:
  announcement: "🚀 **Google ADK for .NET** is now in public beta! Install via NuGet: `dotnet add package GoogleAdk --prerelease`"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true


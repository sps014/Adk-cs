  - Home: index.md
  - Getting Started: getting-started.md
  - Framework Core:
    - Overview: features.md
    - Running Agents:
      - Overview: running-agents.md
      - ADK Web: adk-web.md
      - ADK Server A2A: adk-server-a2a.md
      - Console Runner: console-runner.md
      - Custom Runner: custom-runner.md
    - Architecture & Patterns:
      - Orchestration: orchestration.md
      - Planning: planning.md
    - State & Data:
      - Memory: memory.md
      - State: state.md
      - Caching: caching.md
    - Execution:
      - Streaming: streaming.md
  - Extensions & Tools:
    - Tools Overview: tools.md
    - Search & AI:
      - Google Search Tool: google-search-tool.md
      - Vertex AI Search Tool: vertex-ai-search-tool.md
      - Discovery Engine Search: discovery-engine-search-tool.md
      - Vertex AI RAG: vertex-ai-rag-retrieval-tool.md
    - Databases:
